{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "openmrs-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmrs-backend.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.parentRefs.name }}
      namespace: {{ .Values.gateway.parentRefs.namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.path | default "/openmrs/" }}
      backendRefs:
        {{- if or .Values.traefikService.enabled (gt (int .Values.replicaCount) 1) }}
        - group: traefik.io
          kind: TraefikService
          name: {{ include "openmrs-backend.fullname" . }}-sticky
        {{- else }}
        - name: {{ include "openmrs-backend.fullname" . }}
          port: {{ .Values.service.port | default 8080 }}
        {{- end }}
{{- end }}
