{{- if and .Values.seaweedfs.enabled .Values.seaweedfs.master.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-seaweedfs-master
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmrs-backend.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.seaweedfs.master.httpRoute.parentRefs.name }}
      namespace: {{ .Values.seaweedfs.master.httpRoute.parentRefs.namespace }}
  {{- with .Values.seaweedfs.master.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.seaweedfs.master.httpRoute.path }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Release.Name }}-seaweedfs-master
          port: 9333
{{- end }}
