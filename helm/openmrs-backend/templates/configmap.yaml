apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openmrs-backend.fullname" . }}
  labels:
    {{- include "openmrs-backend.labels" . | nindent 4 }}
data:
  {{- if .Values.mariadb.enabled }}
  OMRS_DB: "mariadb"
  OMRS_DB_NAME: {{ .Values.mariadb.auth.database | default "openmrs" | quote }}
  OMRS_DB_PORT: "3306"
  {{- if .Values.mariadb.galera }}
  OMRS_DB_HOSTNAME: "{{ .Release.Name }}-mariadb"
  OMRS_DB_URL: "jdbc:mariadb:loadbalance://{{ .Release.Name }}-mariadb.{{ .Release.Namespace }}.svc.cluster.local:3306/{{ .Values.mariadb.auth.database | default "openmrs" }}?autoReconnect=true&sessionVariables=default_storage_engine=InnoDB&useUnicode=true&characterEncoding=UTF-8&useMysqlMetadata=true"
  {{- else if gt (int (.Values.mariadb.replicas | default 2)) 1 }}
  OMRS_DB_HOSTNAME: "{{ .Release.Name }}-mariadb-primary"
  OMRS_DB_URL: "jdbc:mariadb:replication://{{ .Release.Name }}-mariadb-primary.{{ .Release.Namespace }}.svc.cluster.local:3306,{{ .Release.Name }}-mariadb-secondary.{{ .Release.Namespace }}.svc.cluster.local:3306/{{ .Values.mariadb.auth.database | default "openmrs" }}?autoReconnect=true&sessionVariables=default_storage_engine=InnoDB&useUnicode=true&characterEncoding=UTF-8&useMysqlMetadata=true"
  {{- else }}
  OMRS_DB_HOSTNAME: "{{ .Release.Name }}-mariadb"
  OMRS_DB_URL: "jdbc:mariadb://{{ .Release.Name }}-mariadb.{{ .Release.Namespace }}.svc.cluster.local:3306/{{ .Values.mariadb.auth.database | default "openmrs" }}?autoReconnect=true&sessionVariables=default_storage_engine=InnoDB&useUnicode=true&characterEncoding=UTF-8&useMysqlMetadata=true"
  {{- end }}
  {{- else }}
  {{- if .Values.db.url }}
  OMRS_DB_URL: {{ .Values.db.url | quote }}
  {{- else }}
  OMRS_DB_HOSTNAME: {{ .Values.db.hostname | quote }}
  OMRS_DB_PORT: {{ .Values.db.port | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.elasticsearch.enabled }}
  OMRS_SEARCH: "elasticsearch"
  OMRS_SEARCH_ES_URIS: {{ include "openmrs-elasticsearch.url" . }}
  # Skips cert verification for Hibernate Search (workaround)
  OMRS_EXTRA_HIBERNATE_SEARCH_BACKEND_SSL_VERIFICATION__MODE: "none"
  # Imports ECK's CA into the JVM truststore so Hibernate Search can verify the certificate properly instead of blindly skipping verification.
  JAVA_TOOL_OPTIONS: "-Djavax.net.ssl.trustStore=/truststore/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
  {{- else if .Values.elasticsearch.uris }}
  OMRS_SEARCH: "elasticsearch"
  OMRS_SEARCH_ES_URIS: {{ .Values.elasticsearch.uris | quote }}
  OMRS_EXTRA_HIBERNATE_SEARCH_BACKEND_SSL_VERIFICATION__MODE: "none"
  {{- end }}
  {{- if .Values.seaweedfs.enabled }}
  storage.type: "s3"
  storage.s3.region: "us-east-2"
  storage.s3.endpoint: {{ include "openmrs-seaweedfs.s3url" . }}
  storage.s3.forcePathStyle: "true"
  {{- end }}
  {{- if .Values.infinispan.clustered }}
  cache.type: "cluster"
  cache.stack: "kubernetes"
  jgroups.dns.query: '{{ include "openmrs-backend.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local'
  jgroups.bind.port: {{ .Values.infinispan.bind_port | quote }}
  {{- else }}
  cache.type: "local"
  {{- end }}