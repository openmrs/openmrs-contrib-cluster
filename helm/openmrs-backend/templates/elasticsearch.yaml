{{- if .Values.elasticsearch.enabled }}
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: {{ include "elasticsearch.clusterName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmrs-backend.labels" . | nindent 4 }}
spec:
  version: {{ .Values.elasticsearch.version | quote }}

  {{- if .Values.elasticsearch.disableSecurity }}
  # Disables ECK-managed TLS at the operator level.
  # When disabled, ECK switches the readiness probe from HTTPS to HTTP,
  # allowing the pod to become Ready and endpoints to populate.
  # WARNING: never set disableSecurity: true in production.
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  {{- end }}

  nodeSets:
    - name: default
      count: {{ .Values.elasticsearch.replicas }}

      config:
        node.roles: ["master", "data", "ingest"]
        node.store.allow_mmap: false
        {{- if .Values.elasticsearch.disableSecurity }}
        {{- end }}

      podTemplate:
        spec:
          initContainers:
            - name: sysctl
              securityContext:
                privileged: true
                runAsUser: 0
              command:
                - sh
                - -c
                - sysctl -w vm.max_map_count={{ .Values.elasticsearch.sysctlVmMaxMapCount }}

          containers:
            - name: elasticsearch
              lifecycle:
                postStart:
                  exec:
                    command:
                      - sh
                      - -c
                      - |
                        if [ -n "{{ .Values.elasticsearch.plugins }}" ]; then
                          bin/elasticsearch-plugin install --batch {{ .Values.elasticsearch.plugins }} || true
                        fi
              env:
                - name: ES_JAVA_OPTS
                  value: {{ .Values.elasticsearch.esJavaOpts | quote }}
              resources:
                {{- toYaml .Values.elasticsearch.resources | nindent 16 }}

      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: {{ .Values.elasticsearch.storageSize }}
{{- end }}