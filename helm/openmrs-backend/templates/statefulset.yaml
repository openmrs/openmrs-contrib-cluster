apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openmrs-backend.fullname" . }}
  labels:
    {{- include "openmrs-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openmrs-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openmrs-backend.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openmrs-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: workdir
          emptyDir: { }

      {{ if .Values.mariadb.enabled }}
      initContainers:
      {{- if or .Values.galera.enabled .Values.mariadb.enabled }}
        - name: resolve-mariadb-hosts
          image: alpine/kubectl:1.33.4
          envFrom:
            - configMapRef:
                name: {{ include "openmrs-backend.fullname" . }}
          command:
            - sh
            - -c
            - |
              echo "Resolving MariaDB hosts..."
              {{- if .Values.mariadb.galera }}
              echo "jdbc:mariadb:loadbalance://{{ .Release.Name }}-mariadb.{{ .Release.Namespace }}.svc.cluster.local:3306/$OMRS_DB_NAME?autoReconnect=true&sessionVariables=default_storage_engine=InnoDB&useUnicode=true&characterEncoding=UTF-8" > /work-dir/jdbc-url.txt
              {{- else }}
              echo "jdbc:mariadb:replication://{{ .Release.Name }}-mariadb-primary.{{ .Release.Namespace }}.svc.cluster.local:3306,{{ .Release.Name }}-mariadb-secondary.{{ .Release.Namespace }}.svc.cluster.local:3306/$OMRS_DB_NAME?autoReconnect=true&sessionVariables=default_storage_engine=InnoDB&useUnicode=true&characterEncoding=UTF-8" > /work-dir/jdbc-url.txt
              {{- end }}
              echo "JDBC URL written: $(cat /work-dir/jdbc-url.txt)"
          volumeMounts:
            - name: workdir
              mountPath: /work-dir
      {{- end }}
      {{- if .Values.elasticsearch.enabled }}
        - name: wait-for-elasticsearch
          image: bitnamilegacy/kubectl:1.33.4
          command:
            - sh
            - -c
            - |
              echo "Waiting for Elasticsearch statefulset to be ready..."
              ES_STATEFULSET="{{ .Release.Name }}-elasticsearch-master"
              MAX_RETRIES=60
              RETRY_INTERVAL=5
              i=0
              until [ "$(kubectl get statefulset $ES_STATEFULSET -n {{ .Release.Namespace }} -o jsonpath='{.status.readyReplicas}')" -gt 0 ] 2>/dev/null; do
                i=$((i + 1))
                if [ $i -ge $MAX_RETRIES ]; then
                  echo "Timeout waiting for Elasticsearch after $((MAX_RETRIES * RETRY_INTERVAL)) seconds."
                  exit 1
                fi
                echo "Elasticsearch not ready yet (attempt $i/$MAX_RETRIES), retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
              done
              echo "Elasticsearch is ready! ($(kubectl get statefulset $ES_STATEFULSET -n {{ .Release.Namespace }} -o jsonpath='{.status.readyReplicas}') replicas ready)"
      {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "openmrs-backend.fullname" . }}
            - secretRef:
                name: {{ include "openmrs-backend.fullname" . }}
          volumeMounts:
            - name: workdir
              mountPath: /work-dir
            - name: data
              mountPath: /openmrs/data
          {{ if .Values.mariadb.enabled }}
          command:
            - sh
            - -c
            - |
              echo "Reading JDBC URL from /work-dir/jdbc-url.txt"
              export OMRS_DB_URL=$(cat /work-dir/jdbc-url.txt)
              echo "OMRS_DB_URL=$OMRS_DB_URL"
              exec /openmrs/startup.sh
          {{ end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.global.defaultStorageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}

