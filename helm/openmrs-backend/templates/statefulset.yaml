apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openmrs-backend.fullname" . }}
  labels:
    {{- include "openmrs-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openmrs-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openmrs-backend.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openmrs-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: workdir
          emptyDir: { }
        {{- if .Values.elasticsearch.enabled }}
        - name: es-ca-cert
          secret:
            secretName: {{ .Release.Name }}-elasticsearch-eck-es-http-certs-public
        - name: es-truststore
          emptyDir: {}
        - name: es-cred
          secret:
            secretName: {{ .Release.Name }}-elasticsearch-eck-es-elastic-user
        {{- end }}

      {{- if or .Values.galera.enabled .Values.mariadb.enabled .Values.elasticsearch.enabled }}
      initContainers:
      {{- if or .Values.galera.enabled .Values.mariadb.enabled }}
        - name: resolve-mariadb-hosts
          image: alpine/kubectl:1.33.4
          envFrom:
            - configMapRef:
                name: {{ include "openmrs-backend.fullname" . }}
          command:
            - sh
            - -c
            - |
              echo "Resolving MariaDB hosts..."
              HOSTS=""
              {{ if .Values.galera.enabled }}
              SERVICE={{ .Release.Name }}-galera
              STATEFULSET=$SERVICE
              {{ end }}
              {{ if .Values.mariadb.enabled }}
              SERVICE={{ .Release.Name }}-mariadb
              STATEFULSET=$SERVICE-secondary
              {{ end }}
              REPLICA_COUNT=$(kubectl get statefulset $STATEFULSET -n {{ .Release.Namespace }} -o jsonpath='{.spec.replicas}')
              {{ if .Values.mariadb.enabled }}
              # Add primary instance
              HOSTS="$SERVICE-primary-0.${SERVICE}-headless.{{ .Release.Namespace }}.svc.cluster.local"
              {{ end }}
              for i in $(seq 0 $((REPLICA_COUNT-1))); do
                POD_FQDN="$STATEFULSET-${i}.${SERVICE}-headless.{{ .Release.Namespace }}.svc.cluster.local"
              
                # Append to HOSTS, separated by comma
                if [ -z "$HOSTS" ]; then
                  HOSTS="$POD_FQDN"
                else
                  HOSTS="$HOSTS,$POD_FQDN"
                fi
              done
              {{ if .Values.galera.enabled }}
                MODE="loadbalance"
              {{ else }}
                MODE="replication"
              {{ end }}
              echo "jdbc:mariadb:$MODE://$HOSTS:3306/$OMRS_DB_NAME?autoReconnect=true&sessionVariables=default_storage_engine=InnoDB&useUnicode=true&characterEncoding=UTF-8" > /work-dir/jdbc-url.txt
              echo "JDBC URL written: $(cat /work-dir/jdbc-url.txt)"
          volumeMounts:
            - name: workdir
              mountPath: /work-dir
      {{- end }}
      {{- if .Values.elasticsearch.enabled }}
        - name: import-es-ca
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - sh
            - -c
            - |
              echo "Importing ECK CA certificate into truststore..."
              cp "$JAVA_HOME/lib/security/cacerts" /truststore/cacerts 2>/dev/null || \
              cp /etc/ssl/certs/java/cacerts /truststore/cacerts 2>/dev/null || \
              keytool -genkey -alias dummy -keystore /truststore/cacerts -storepass changeit -noprompt
              keytool -import -trustcacerts -alias es-ca \
                -file /etc/es-ca/ca.crt \
                -keystore /truststore/cacerts \
                -storepass changeit -noprompt 2>/dev/null || \
              echo "Certificate already imported"
              keytool -list -alias es-ca -keystore /truststore/cacerts -storepass changeit >/dev/null 2>&1 && \
              echo "ECK CA certificate successfully added to truststore" || \
              echo "WARNING: Failed to import ECK CA certificate"
          volumeMounts:
            - name: es-ca-cert
              mountPath: /etc/es-ca
              readOnly: true
            - name: es-truststore
              mountPath: /truststore
        - name: wait-for-elasticsearch
          image: alpine/kubectl:1.33.4
          command:
            - sh
            - -c
            - |
              echo "Waiting for ECK Elasticsearch to be ready..."
              ES_CR="{{ include "elasticsearch.clusterName" . }}"
              MAX_RETRIES=60
              RETRY_INTERVAL=5
              i=0
              until [ "$(kubectl get elasticsearch $ES_CR -n {{ .Release.Namespace }} -o jsonpath='{.status.health}')" = "green" ] 2>/dev/null || \
                    [ "$(kubectl get elasticsearch $ES_CR -n {{ .Release.Namespace }} -o jsonpath='{.status.health}')" = "yellow" ] 2>/dev/null; do
                i=$((i + 1))
                if [ $i -ge $MAX_RETRIES ]; then
                  echo "Timeout waiting for Elasticsearch after $((MAX_RETRIES * RETRY_INTERVAL)) seconds."
                  exit 1
                fi
                echo "Elasticsearch not ready yet (attempt $i/$MAX_RETRIES), retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
              done
              echo "Elasticsearch is ready! ($(kubectl get elasticsearch $ES_CR -n {{ .Release.Namespace }} -o jsonpath='{.status.health}'))"
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "openmrs-backend.fullname" . }}
            - secretRef:
                name: {{ include "openmrs-backend.fullname" . }}
          volumeMounts:
            - name: data
              mountPath: /openmrs/data
          {{- if .Values.elasticsearch.enabled }}
            - name: es-truststore
              mountPath: /truststore
            - name: es-cred
              mountPath: /etc/es-cred
              readOnly: true
          {{- end }}
          {{ if or (.Values.galera.enabled) (.Values.mariadb.enabled) }}
          command:
            - sh
            - -c
            - |
              echo "Reading JDBC URL from /work-dir/jdbc-url.txt"
              export OMRS_DB_URL=$(cat /work-dir/jdbc-url.txt)
              echo "OMRS_DB_URL=$OMRS_DB_URL"
              {{- if .Values.elasticsearch.enabled }}
              export OMRS_EXTRA_HIBERNATE_SEARCH_BACKEND_PASSWORD=$(cat /etc/es-cred/elastic)
              export JAVA_OPTS="$JAVA_OPTS -Djavax.net.ssl.trustStore=/truststore/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
              {{- end }}
              exec /openmrs/startup.sh
          {{ end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.global.defaultStorageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}

