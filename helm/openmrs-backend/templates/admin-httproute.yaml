{{- if and .Values.seaweedfs.enabled .Values.seaweedfs.admin.enabled .Values.seaweedfs.admin.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-seaweedfs-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmrs-backend.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.seaweedfs.admin.httpRoute.parentRefs.name }}
      namespace: {{ .Values.seaweedfs.admin.httpRoute.parentRefs.namespace }}
  {{- with .Values.seaweedfs.admin.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.seaweedfs.admin.urlPrefix }}
      backendRefs:
        - name: {{ .Release.Name }}-seaweedfs-admin
          port: 23646
{{- end }}
