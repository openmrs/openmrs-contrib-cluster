{{- if and .Values.monitoring.enabled .Values.grafana.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmrs-backend.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.grafana.httpRoute.parentRefs.name }}
      namespace: {{ .Values.grafana.httpRoute.parentRefs.namespace }}
  {{- with .Values.grafana.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.grafana.httpRoute.path }}
      backendRefs:
        - name: {{ .Release.Name }}-grafana
          port: 80
{{- end }}
