# Default values for openmrs-backend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  defaultStorageClass: "gp2"

  security:
    allowInsecureImages: true

replicaCount: 1

image:
  repository: openmrs/openmrs-reference-application-3-backend
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

infinispan:
  clustered: false
  bind_port: 7800

db:
  hostname: mariadb
  port: 3306
  username: openmrs
  password: OpenMRS123

mariadb:
  image:
    repository: mariadb
    tag: "10.11"
  auth:
    rootPassword: Root123
    database: openmrs
    username: openmrs
    password: OpenMRS123
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  enabled: false
  replicas: 2
  galera: true

elasticsearch:
  enabled: false

elasticsearch-eck:
  version: "8.15.3"
  image: openmrs/openmrs-contrib-elasticsearch:8.15.3

  nodeSets:
    - name: default
      count: 3
      config:
        node.roles:
          - master
          - data
          - ingest
        node.store.allow_mmap: false

      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              resources:
                requests:
                  cpu: 500m
                  memory: "2Gi"
                  ephemeral-storage: 2Gi
                limits:
                  cpu: 750m
                  memory: "2Gi"
                  ephemeral-storage: 10Gi

  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

seaweedfs:
  master:
    replicas: 3
    route:
      enabled: false
      parentRefs:
        name: traefik-gateway
        namespace: openmrs-system
      hostnames:
        - localhost
      path: /seaweedfs-master
  volume:
    enabled: true
    replicas: 3
    dataDirs:
      - name: data
        type: "persistentVolumeClaim"
        storageClass: "standard"
        size: "8Gi"
        maxVolumes: 0
  filer:
    enabled: true
    replicas: 3
    route:
      enabled: false
      parentRefs:
        name: traefik-gateway
        namespace: openmrs-system
      hostnames:
        - localhost
      path: /seaweedfs-filer
    extraEnvironmentVars:
      WEED_MYSQL_ENABLED: "true"
      WEED_MYSQL_HOSTNAME: "{{ .Release.Name }}-mariadb"
      WEED_MYSQL_DATABASE: "openmrs"
      WEED_MYSQL_USERNAME: "openmrs"
      WEED_LEVELDB2_ENABLED: "false"
    secretExtraEnvironmentVars:
      WEED_MYSQL_PASSWORD:
        secretKeyRef:
          name: "openmrs-backend-mariadb-secret"
          key: user-password
  s3:
    enabled: true
    replicas: 2
    enableAuth: true
    credentials:
      admin:
        accessKey: "openmrs"
        secretKey: "OpenMRS123"

imagePullSecrets: []

persistence:
  enabled: true
  size: 8Gi

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1001
  runAsUser: 1001
  fsGroupChangePolicy: "Always"

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1001


service:
  type: ClusterIP
  port: 8080

gateway:
  enabled: true
  path: /openmrs/
  parentRefs:
    name: traefik-gateway
    namespace: openmrs-system

traefikService:
  enabled: false
  sticky:
    cookie:
      secure: false

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "http-cookie"
    nginx.ingress.kubernetes.io/session-cookie-expires: "43200"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "43200"
  rules:
    - http:
      paths:
        - path: /openmrs/
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
     cpu: 4.0
     memory: 4Gi
  requests:
     cpu: 1000m
     memory: 2Gi

livenessProbe:
  httpGet:
    path: /openmrs/health/started
    port: 8080
  failureThreshold: 3
  timeoutSeconds: 1
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /openmrs/health/started
    port: 8080
  initialDelaySeconds: 60
  failureThreshold: 10
  timeoutSeconds: 5
  periodSeconds: 15
startupProbe:
  httpGet:
    path: /openmrs/health/started
    port: 8080
  initialDelaySeconds: 20
  failureThreshold: 120
  timeoutSeconds: 1
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80


# Monitoring of logs & metrics
monitoring:
  enabled: false

grafana:
  adminPassword: "Admin123"
  grafana.ini: # Needed for serving from path
    server:
      domain: localhost
      root_url: "http://localhost:8080/grafana"
      serve_from_sub_path: true
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/default/logs-dashboard.json
    log:
      level: warn
    dataproxy:
      timeout: 300
      keep_alive_seconds: 300
  ingress:
    enabled: true
    hosts:
      - "localhost"
    path: '/grafana'
  route: {}
  # Custom HTTPRoute config used by grafana-httproute.yaml
  httpRoute:
    enabled: false
    parentRefs:
      name: traefik-gateway
      namespace: openmrs-system
    hostnames:
      - localhost
    path: /grafana
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          url: "http://{{ .Release.Name }}-loki.{{ .Release.Namespace }}.svc.cluster.local:3100"
          access: proxy
          isDefault: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboardsConfigMaps:
    default: "logs-dashboard"

loki:
  deploymentMode: SingleBinary
  # Explicitly disable scalable targets to satisfy validation when using filesystem storage
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  test:
    enabled: false
  lokiCanary:
    enabled: false
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    server:
      log_level: warn
      http_server_read_timeout: 300s
      http_server_write_timeout: 300s
    limits_config:
      retention_period: 14d
      query_timeout: 300s
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
    storage:
      type: 'filesystem'
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

alloy:
  alloy:
    configMap:
      create: false
      name: alloy-config
  controller:
    type: daemonset
