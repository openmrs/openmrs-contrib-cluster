# Default values for openmrs-backend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  defaultStorageClass: "gp2"
  defaultIngressClass: "nginx"
  security:
    allowInsecureImages: true

replicaCount: 1

image:
  repository: openmrs/openmrs-reference-application-3-backend
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

infinispan:
  clustered: false
  bind_port: 7800

db:
  hostname: mariadb
  port: 3306
  username: openmrs
  password: OpenMRS123

galera:
  enabled: false
  image:
    repository: bitnamilegacy/mariadb-galera
    tag: 10.11
  rootUser:
    password: Root123
  db:
    name: openmrs
    user: openmrs
    password: OpenMRS123
  galera:
    mariabackup:
      password: Backup123

mariadb:
  enabled: true
  image:
    repository: bitnamilegacy/mariadb
    tag: 10.11
  architecture: replication
  auth:
    rootPassword: Root123
    replicationPassword: Replicate123
    database: openmrs
    username: openmrs
    password: OpenMRS123

  primary:
    persistence:
      enabled: true
      size: 8Gi
  secondary:
    persistence:
      enabled: true
      size: 8Gi

elasticsearch:
  enabled: false

elasticsearch-eck:
  # Elasticsearch version deployed by ECK
  version: "8.15.3"

  # nodeSets defines the cluster topology
  # For local/CI: single node with all roles
  nodeSets:
    - name: default
      count: 1
      config:
        node.roles:
          - master
          - data
          - ingest
        node.store.allow_mmap: false

        # Anonymous access — ECK-supported way to allow unauthenticated
        # connections from the OpenMRS backend without disabling security.
        # See: https://www.elastic.co/guide/en/elasticsearch/reference/8.15/anonymous-access.html
        # WARNING: Only enable in local/CI environments. Never use in production.
        xpack.security.authc.anonymous.username: anonymous
        xpack.security.authc.anonymous.roles: superuser
        xpack.security.authc.anonymous.authz_exception: false

      podTemplate:
        spec:
          initContainers:
            - name: sysctl
              securityContext:
                privileged: true
                runAsUser: 0
              command:
                - sh
                - -c
                - sysctl -w vm.max_map_count=262144

          containers:
            - name: elasticsearch
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xmx512m -Xms512m"
              lifecycle:
                postStart:
                  exec:
                    command:
                      - sh
                      - -c
                      - |
                        if [ -n "analysis-phonetic" ]; then
                          bin/elasticsearch-plugin install --batch analysis-phonetic || true
                        fi
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                  ephemeral-storage: 50Mi
                limits:
                  cpu: 750m
                  memory: 768Mi
                  ephemeral-storage: 2Gi

  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi

minio:
  enabled: false
  image:
    repository: bitnamilegacy/minio
    tag: 2025.7.23
  clientImage:
    repository: bitnamilegacy/minio-client
  defaultInitContainers:
    volumePermissions:
      image:
        repository: bitnamilegacy/os-shell
  console:
    image:
      repository: bitnamilegacy/minio-object-browser
  mode: distributed
  auth:
    rootPassword: Root1234
  statefulset:
    replicaCount: 4
    zones: 1
    drivesPerNode: 1
  provisioning:
    enabled: true
    buckets:
      - name: openmrs
    users:
      - username: openmrs
        password: OpenMRS123
        policies: ["readwrite"]

imagePullSecrets: []

persistence:
  enabled: true
  size: 8Gi

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1001
  runAsUser: 1001
  fsGroupChangePolicy: "Always"

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1001


service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "http-cookie"
    nginx.ingress.kubernetes.io/session-cookie-expires: "43200" # 12h
    nginx.ingress.kubernetes.io/session-cookie-max-age: "43200" # 12h
  rules:
    - http:
      paths:
        - path: /openmrs/
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
     cpu: 1.0
     memory: 2Gi
  requests:
     cpu: 200m
     memory: 1536Mi

livenessProbe:
  httpGet:
    path: /openmrs/health/alive
    port: 8080
  failureThreshold: 3
  timeoutSeconds: 1
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /openmrs/health/started
    port: 8080
  failureThreshold: 1
  timeoutSeconds: 1
  periodSeconds: 10
startupProbe:
  httpGet:
    path: /openmrs/health/alive
    port: 8080
  initialDelaySeconds: 20
  failureThreshold: 120 # wait for max 20 minutes to startup
  timeoutSeconds: 1
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80


# Monitoring of logs & metrics
monitoring:
  enabled: false

grafana:
  adminPassword: "Admin123"
  grafana.ini: # Needed for serving from path
    server:
      domain: localhost
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/default/logs-dashboard.json
    log:
      level: warn
    dataproxy:
      timeout: 300
      keep_alive_seconds: 300
  ingress:
    enabled: true
    hosts:
      - "localhost"
    path: '/grafana'
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          url: "http://{{ .Release.Name }}-loki.{{ .Release.Namespace }}.svc.cluster.local:3100"
          access: proxy
          isDefault: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboardsConfigMaps:
    default: "logs-dashboard"

loki:
  deploymentMode: SingleBinary
  # Explicitly disable scalable targets to satisfy validation when using filesystem storage
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  test:
    enabled: false
  lokiCanary:
    enabled: false
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    server:
      log_level: warn
      http_server_read_timeout: 300s
      http_server_write_timeout: 300s
    limits_config:
      retention_period: 14d
      query_timeout: 300s
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
    storage:
      type: 'filesystem'
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

alloy:
  alloy:
    configMap:
      create: false
      name: alloy-config
  controller:
    type: daemonset
