# Gateway API provider
providers:
  kubernetesGateway:
    enabled: true

# Gateway listener
gateway:
  listeners:
    web:
      port: 8000
      protocol: HTTP
      namespacePolicy:
        from: All

# Port configuration
ports:
  web:
    port: 8000
    hostPort: 8080
    exposedPort: 80

# Service
service:
  enabled: true
  type: ClusterIP

# Pin to control-plane node (needed for kind's extraPortMappings)
nodeSelector:
  node-role.kubernetes.io/control-plane: ""
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
