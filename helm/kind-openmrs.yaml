global:
  defaultStorageClass: standard
  defaultIngressClass: nginx
openmrs-backend:
  image:
    repository: openmrs/openmrs-reference-application-3-backend
    tag: nightly-0-core-2.8
    pullPolicy: IfNotPresent #IfNotPresent / Always
  replicaCount: 2 # Enabled experimentally
  infinispan:
    clustered: true
  monitoring:
    enabled: true
  galera:
    enabled: true
    replicaCount: 3
    rootUser:
      password: Root123
    db:
      name: openmrs
      user: openmrs
      password: OpenMRS123
    galera:
      mariabackup:
        password: Backup123
  mariadb:
    enabled: false
  elasticsearch:
    enabled: true

  elasticsearch-eck:
    version: "8.15.3"
    nodeSets:
      - name: default
        count: 1
        config:
          node.roles:
            - master
            - data
            - ingest
          node.store.allow_mmap: false
          xpack.security.authc.anonymous.username: anonymous
          xpack.security.authc.anonymous.roles: superuser
          xpack.security.authc.anonymous.authz_exception: false
        podTemplate:
          spec:
            containers:
              - name: elasticsearch
                env:
                  - name: ES_JAVA_OPTS
                    value: "-Xmx512m -Xms512m"
  minio:
    enabled: true
    auth:
      rootPassword: Root1234
    provisioning:
      users:
        - username: openmrs
          password: OpenMRS123
          policies: ["readwrite"]
openmrs-frontend:
  image:
    repository: openmrs/openmrs-reference-application-3-frontend
    tag: nightly-0-core-2.8
    pullPolicy: IfNotPresent #IfNotPresent / Always