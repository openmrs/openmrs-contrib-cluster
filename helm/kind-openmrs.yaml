global:
  defaultStorageClass: standard
openmrs-backend:
  image:
    repository: openmrs/openmrs-reference-application-3-backend
    tag: nightly-0-core-2.8
    pullPolicy: IfNotPresent #IfNotPresent / Always
  replicaCount: 2
  startupProbe:
    httpGet:
      path: /openmrs/health/started
      port: 8080
    initialDelaySeconds: 20
    failureThreshold: 360
    timeoutSeconds: 1
    periodSeconds: 10
  gateway:
    enabled: true
  traefikService:
    enabled: true
  infinispan:
    clustered: true
  monitoring:
    enabled: true
  mariadb:
    enabled: true
  elasticsearch:
    enabled: true

  elasticsearch-eck:
    version: "8.15.3"
    image: openmrs/openmrs-contrib-elasticsearch:8.15.3
    nodeSets:
      - name: default
        count: 1
        config:
          node.roles:
            - master
            - data
            - ingest
          node.store.allow_mmap: false
        
        podTemplate:
          spec:
            containers:
              - name: elasticsearch
                resources:
                  requests:
                    cpu: 500m
                    memory: "2Gi"
                    ephemeral-storage: 2Gi
                  limits:
                    cpu: 750m
                    memory: "2Gi"
                    ephemeral-storage: 10Gi

  minio:
    enabled: true
    auth:
      rootPassword: Root1234
    provisioning:
      users:
        - username: openmrs
          password: OpenMRS123
          policies: ["readwrite"]
openmrs-frontend:
  image:
    repository: openmrs/openmrs-reference-application-3-frontend
    tag: nightly-0-core-2.8
    pullPolicy: IfNotPresent #IfNotPresent / Always