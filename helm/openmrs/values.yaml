# Default values for openmrs.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  defaultStorageClass: "gp2"
  defaultIngressClass: "traefik"

openmrs-backend:
  nameOverride: "backend"

  infinispan:
    clustered: false
    bind_port: 7800

  db:
    hostname: ""

  galera:
    enabled: false
    rootUser:
      password: Root123
    db:
      name: openmrs
      user: openmrs
      password: OpenMRS123
    galera:
      mariabackup:
        password: Backup123

  mariadb:
    enabled: true
    auth:
      rootPassword: Root123
      replicationPassword: Replicate123
      database: openmrs
      username: openmrs
      password: OpenMRS123

openmrs-frontend:
  enabled: true
  nameOverride: "frontend"

# Backup and Restore configuration 
# Disabled by default. Set backup.enabled to true to turn on automated backups.
backup:
  enabled: false

  # How often to take a backup. Default is every day at 02:00 UTC.
  schedule: "0 2 * * *"

  # How long to keep backups before they are deleted. Default is 30 days.
  ttl: "720h0m0s"

  # The S3 bucket where backups will be stored.
  bucket: ""

  # The AWS region where the S3 bucket lives.
  region: "us-east-1"

  # Set to true only if using MinIO or other S3-compatible endpoints.
  # Leave as false for standard AWS S3.
  s3ForcePathStyle: false

  # AWS credentials for accessing the S3 bucket.
  # These will be stored as a Kubernetes secret, never in plain text.
  credentials:
    accessKey: ""
    secretKey: ""

  # Restore settings.
  restore:
    # Set to true to enable the scheduled restore CronJob.
    # Disabled by default — restoring data should be an admin-triggered action.
    enabled: false

    # Schedule for the daily restore job.
    # Runs after the backup, e.g. if backup is at 02:00 restore runs at 03:00.
    schedule: "0 3 * * *"

  # The namespace where Velero is installed.
  # Velero stores its Backup and Restore resources in its own namespace.
  veleroNamespace: "velero"

  # MariaDB backup settings — runs a dedicated CronJob that dumps the DB directly to S3.
  mariadbBackup:
    enabled: false
    schedule: "30 1 * * *"
    bucket: ""
    region: "us-east-1"
    s3ForcePathStyle: false

    # S3-compatible endpoint URL. Only needed for MinIO or other non-AWS endpoints.
    # Example: "http://minio.minio-namespace.svc.cluster.local:9000"
    s3Endpoint: ""

    # MariaDB primary host. Defaults to {{ .Release.Name }}-mariadb-primary
    # if left empty. Override this if you use nameOverride on the MariaDB sub-chart.
    mariadbHost: ""

    credentials:
      accessKey: ""
      secretKey: ""

