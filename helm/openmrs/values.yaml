# Default values for openmrs.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  defaultStorageClass: "gp2"
  defaultIngressClass: "traefik"

openmrs-backend:
  nameOverride: "backend"

  infinispan:
    clustered: false
    bind_port: 7800

  db:
    hostname: ""

  galera:
    enabled: false
    rootUser:
      password: Root123
    db:
      name: openmrs
      user: openmrs
      password: OpenMRS123
    galera:
      mariabackup:
        password: Backup123

  mariadb:
    enabled: true
    auth:
      rootPassword: Root123
      replicationPassword: Replicate123
      database: openmrs
      username: openmrs
      password: OpenMRS123

openmrs-frontend:
  enabled: true
  nameOverride: "frontend"

# Backup and Restore configuration 
# Disabled by default. Set backup.enabled to true to turn on automated backups.
backup:
  enabled: false

  # How often to take a backup. Default is every day at 02:00 UTC.
  schedule: "0 2 * * *"

  # How long to keep backups before they are deleted. Default is 30 days.
  ttl: "720h0m0s"

  # The S3 bucket where backups will be stored.
  bucket: ""

  # The AWS region where the S3 bucket lives.
  region: "us-east-1"

  # AWS credentials for accessing the S3 bucket.
  # These will be stored as a Kubernetes secret, never in plain text.
  credentials:
    accessKey: ""
    secretKey: ""

  # Restore health check settings.
  restore:
    # How often to run the health check.
    schedule: "*/30 * * * *"

    # How many minutes a pod must be broken before a restore is triggered.
    # This prevents false triggers during normal pod restarts.
    brokenThresholdMinutes: 15