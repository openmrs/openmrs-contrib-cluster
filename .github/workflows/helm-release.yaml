name: Release Charts

on:
  push:
    branches:
      - release

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.2

      - name: Add Helm Repositories
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts

      - name: Update Chart.yaml dependencies
        run: |
          # Replace local file paths with the GitHub Pages URL for the release
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          sed -i "s|repository: \"file://../openmrs-backend\"|repository: \"$REPO_URL\"|g" helm/openmrs/Chart.yaml
          sed -i "s|repository: \"file://../openmrs-frontend\"|repository: \"$REPO_URL\"|g" helm/openmrs/Chart.yaml


      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"