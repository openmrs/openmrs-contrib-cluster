name: Helm Build

on:
  push:
    paths:
      - 'helm/**'
  pull_request:
    paths:
      - 'helm/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.2

      - name: Add Helm Repositories
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add mariadb-operator https://helm.mariadb.com/mariadb-operator
          helm repo add elastic https://helm.elastic.co
          helm repo add traefik https://traefik.github.io/charts

      - name: Lint Subcharts
        run: |
          helm lint helm/openmrs-backend
          helm lint helm/openmrs-frontend

      - name: Update Dependencies
        run: |
          helm dependency update helm/openmrs
          helm dependency update helm/openmrs-operator

      - name: Lint Charts
        run: |
          helm lint helm/openmrs
          helm lint helm/openmrs-operator

      - name: Package Chart
        run: |
          helm package helm/openmrs
          helm package helm/openmrs-operator